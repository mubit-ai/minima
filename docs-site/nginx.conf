server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2
        application/wasm;

    # Security
    add_header X-Content-Type-Options  "nosniff"                        always;
    add_header X-Frame-Options         "DENY"                           always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Long-cache Vite's content-hashed assets (Vocs emits them under /assets/).
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|wasm)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML pages — don't cache so updates are instant. SPA fallback for deep
    # links: Vocs ships static HTML per page, and the fallback covers refreshes
    # and anchor-only client routes.
    location / {
        expires -1;
        add_header Cache-Control "no-store";
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Cloud Run liveness / readiness probe
    location /_health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
