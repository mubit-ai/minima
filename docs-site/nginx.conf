server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Security
    add_header X-Content-Type-Options  "nosniff"                       always;
    add_header X-Frame-Options         "DENY"                          always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Aggressively cache Astro's content-hashed assets (/_astro/*)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Other static assets (images, fonts, etc.)
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # HTML pages — don't cache so updates are instant
    location / {
        expires -1;
        add_header Cache-Control "no-store";
        try_files $uri $uri/ $uri.html =404;
    }

    # Cloud Run liveness / readiness probe
    location /_health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
