// =============================================================================
// Context Block — pre-assembled memory for LLM prompt injection
// =============================================================================

message ContextRequest {
  string run_id = 1;
  // Natural language query/topic to assemble context for.
  string query = 2;
  // Optional user/entity ID to scope context to.
  string user_id = 3;
  // Optional LTM entry type filter (e.g. ["fact", "lesson"]).
  repeated string entry_types = 4;
  // Whether to include Working Memory in the context block.
  bool include_working_memory = 5;
  // Output format: "structured" (default, section headers) or "compact".
  string format = 6;
  // Maximum number of evidence items per section.
  uint64 limit = 7;
  // Maximum token budget for the assembled context block.
  // When > 0, sections are filled in priority order (mental_models → rules →
  // lessons → facts → observations → working_memory → traces → goals) until
  // the budget is exhausted. Items within each section are ordered by
  // descending score. When 0 (default), no budget limit is applied.
  uint32 max_token_budget = 8;
  // Optional agent ID for scope-aware context assembly.
  string agent_id = 9;
  // Progressive disclosure mode:
  // - "full" (default): full context block + section summaries
  // - "summary": section summaries only (empty context_block)
  // - "sections": include only explicitly requested sections
  string mode = 10;
  // Section filter for mode="sections". Supported section keys:
  // mental_models, active_rules, lessons, archive_blocks, handoffs, feedback,
  // facts, observations, working_memory, traces, goals, checkpoints, logs, other
  repeated string sections = 11;
  // Optional lane filter for multi-agent coordination.
  // When set, only entries tagged with this lane are included in context.
  string lane_filter = 12;
}

message ContextSectionSummary {
  string section_name = 1;
  uint32 item_count = 2;
  string top_item_preview = 3;
  uint32 estimated_tokens = 4;
}

message ContextResponse {
  // Pre-assembled text block formatted for LLM prompt injection.
  // Stable ordering: mental_models → rules → lessons → facts → observations →
  // working_memory → traces → goals.
  string context_block = 1;
  // Estimated token count of the context block.
  uint32 token_estimate = 2;
  // Source evidence items used to build the block.
  repeated QueryEvidence sources = 3;
  // Actual token count used (equal to token_estimate when no budget limit).
  uint32 budget_used = 4;
  // Remaining budget (0 when no budget limit or budget fully used).
  uint32 budget_remaining = 5;
  // Per-section summaries to support progressive disclosure UX.
  repeated ContextSectionSummary section_summaries = 6;
  // Source counts by final entry type for the included context sources.
  map<string, uint32> source_counts_by_entry_type = 7;
  // Source counts by retrieval provenance mode for the included context sources.
  map<string, uint32> source_counts_by_retrieval_mode = 8;
  // Number of evidence candidates considered before token-budget truncation.
  uint32 evidence_candidates_considered = 9;
  // Number of evidence candidates dropped because of the token budget.
  uint32 evidence_dropped_by_budget = 10;
  // Number of included exact-referenceable sources in the final context block.
  uint32 exact_references_surfaced = 11;
  // Human-readable reason when context_block is empty or degraded.
  // Values: "no_evidence", "recency_fallback", "budget_exhausted", or empty.
  string empty_reason = 12;
}

