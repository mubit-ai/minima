  // When > 0, takes only the N most recent entries from knowledge + history.
  uint32 last_n_items = 12;
  // Whether to include step outcomes as evidence (default true).
  // Integrates with RecordStepOutcome for dense process-reward signals.
  bool include_step_outcomes = 13;
}

message ReflectLesson {
  string content = 1;
  string lesson_type = 2;   // "success", "failure", "observation", "rule", "preference"
  string scope = 3;         // "run", "session", "global"
  string importance = 4;    // "low", "medium", "high", "critical"
  repeated string conditions = 5;
  string rationale = 6;
  // Stable lesson id populated server-side after the lesson is persisted.
  // Use this directly with `record_outcome(reference_id=...)` instead of
  // round-tripping through `list_lessons()` — the vector-store index has
  // propagation delay that can make immediately-following `list_lessons`
  // queries return the run as empty even though the lesson was stored.
  // Empty when the lesson extraction succeeded but the persistence call failed.
  string lesson_id = 7;
}

message ReflectResponse {
  repeated ReflectLesson lessons = 1;
  string summary = 2;
  float confidence = 3;
