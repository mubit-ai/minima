// =============================================================================
// Outcome Feedback (RL-like learning loop)
// =============================================================================

message RecordOutcomeRequest {
  string run_id = 1;
  // The lesson ID or action ID this outcome pertains to.
  string reference_id = 2;
  // "success", "failure", "partial", "neutral"
  string outcome = 3;
  // Numeric signal: positive = reward, negative = penalty, range [-1.0, 1.0]
  float signal = 4;
  // Human or agent-provided rationale for the outcome.
  string rationale = 5;
  // Optional agent attribution.
  string agent_id = 6;
  // Optional user scope.
  string user_id = 7;
  // When true, this lesson was applied and verified in a live production
  // environment (not just a test or staging run). Production-verified lessons
  // receive a configurable ranking boost (MUBIT_CONTROL_PROD_VERIFIED_BOOST)
  // and are surfaced with higher knowledge_confidence.
  bool verified_in_production = 8;
  // Additional memory entry IDs that contributed to this outcome (multi-entry
  // attribution). When a single result is produced from several recalled
  // entries, list them all here so each one's reinforcement count and
  // success/failure counters are updated, not just the primary `reference_id`.
  // Entries are resolved within the run and scope-checked; unknown or
  // out-of-scope IDs are skipped. The primary `reference_id` is never
  // double-counted if it also appears here.
  repeated string entry_ids = 9;
  // Optional client-supplied dedup token. When set, the server applies this
  // outcome at most once for the token — a retry with the same token (e.g.
  // after a transport timeout) returns success WITHOUT re-applying the signal,
  // so reinforcement counts and champion/challenger stats aren't double-counted.
  // Leave empty to opt out (every call applies).
  string idempotency_key = 10;
}

message RecordOutcomeResponse {
  bool success = 1;
  // Updated reinforcement count for the referenced lesson.
  int32 reinforcement_count = 2;
  // Current confidence score after reinforcement.
  float updated_confidence = 3;
}

