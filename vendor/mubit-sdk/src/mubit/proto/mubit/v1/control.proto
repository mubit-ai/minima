// =============================================================================
// Project Management — logical groupings of agents in a multi-agent system
// =============================================================================

message ProjectDefinition {
  string project_id = 1;
  string name = 2;
  string description = 3;
  repeated string agent_ids = 4;
  string created_at = 5;
  string updated_at = 6;
  // Phase 4.1: per-project tunables. Override server-wide defaults for
  // ranking/reflection/consolidation/drift/promotion without env-var changes.
  ProjectSettings settings = 7;
}

// Phase 4.1: project-scoped tunables. All fields are optional; unset fields
// fall back to server-wide environment-variable defaults. Use
// ProjectSettings to canary new weights on one project before rolling out.
message ProjectSettings {
  TuningConfig tuning = 1;
  PromotionRecommendationConfig promotion_recommendation = 2;
}

message TuningConfig {
  // Query scoring weights. Defaults: 1.0 / 0.25 / 0.10 / 0.3.
  float query_semantic_weight = 1;
  float query_lexical_weight = 2;
  float query_recency_weight = 3;
  float query_reinforcement_weight = 4;
  uint32 query_evidence_budget = 5;
  // Auto-reflection cadence. Defaults: 0 (off) / 3 / 0.4.
  uint32 reflection_auto_threshold = 6;
  uint32 reflection_negative_streak = 7;
  float reflection_variance_threshold = 8;
  uint32 reflection_tool_volume_threshold = 9;
  // Outcome learning rate. Default 0.1.
  float outcome_learning_rate = 10;
  // Consolidation. Defaults: 3 / 50.
  uint32 consolidation_min_items = 11;
  uint32 consolidation_max_items = 12;
  // Drift monitor knobs. Defaults: 10 / 0.45 / 0.2 / 3.
  uint32 drift_repeat_window = 13;
  float drift_objective_threshold = 14;
  float drift_novelty_threshold = 15;
  uint32 drift_repeat_threshold = 16;
  // Ingestion human-importance floor (Fix 4.4). 0 = disabled (default unchanged).
  string ingestion_human_importance_floor = 17;

  // Phase A (AutoReason) per-project overrides. All zero = server defaults.
  // Number of judges on the Borda panel (default 3, paper's range 3-7).
  uint32 review_judges = 18;
  // When >0, enables the review path for this project even if the global
  // MUBIT_CONTROL_REVIEW_ENABLED is off. Boolean expressed as 0/1.
  uint32 review_enabled = 19;
  // 0 = leave at default (true), 1 = disable synthesis (ablation).
  uint32 review_disable_synthesis = 20;
  // Consecutive unchanged wins before the lineage is locked. Default 2.
  uint32 review_lock_streak = 21;

  // Phase B (Run Monitor) per-project overrides.
  // When >0, enables the monitor router for this project. Boolean 0/1.
  uint32 run_monitor_enabled = 22;
  // "rule" | "llm" | "hybrid". Empty = server default.
  string run_monitor_mode = 23;
  // Task-kind hint: "structured" | "open_ended" | "unknown". Empty = unknown.
  string run_monitor_task_kind = 24;
}

message PromotionRecommendationConfig {
  // Enable emission of ready_for_promotion flags on challenger versions. Off by
  // default so the non-destructive signal can stay quiet on legacy projects.
  bool enabled = 1;
  // Minimum number of challenger outcomes before a recommendation can fire.
  // Default 10.
  uint32 min_runs = 2;
  // Required excess of mean challenger signal over champion signal. Default 0.05.
  float epsilon = 3;
}

message CreateProjectRequest {
  string name = 1;
  string description = 2;
  // Phase 4.1: optional initial settings. May be updated later via UpdateProject.
  ProjectSettings settings = 3;
}

message CreateProjectResponse {
  bool success = 1;
  ProjectDefinition project = 2;
}

message GetProjectRequest {
  string project_id = 1;
}

message GetProjectResponse {
  ProjectDefinition project = 1;
}

message ListProjectsRequest {
  uint32 limit = 1;
}

message ListProjectsResponse {
  repeated ProjectDefinition projects = 1;
}

message UpdateProjectRequest {
  string project_id = 1;
  string name = 2;
  string description = 3;
  // Phase 4.1: when present, replaces the project's settings block.
  ProjectSettings settings = 4;
}

message UpdateProjectResponse {
  bool success = 1;
  ProjectDefinition project = 2;
}

message DeleteProjectRequest {
  string project_id = 1;
}

// =============================================================================
// Agent Definitions — persistent, project-scoped agent configurations
// =============================================================================

message AgentDefinition {
  string agent_id = 1;
  string project_id = 2;
  string role = 3;
  string system_prompt_content = 4;
  string description = 5;
  string created_at = 6;
  string updated_at = 7;
}

message CreateAgentDefinitionRequest {
  string project_id = 1;
  string agent_id = 2;
  string role = 3;
  string system_prompt_content = 4;
  string description = 5;
}

message CreateAgentDefinitionResponse {
  bool success = 1;
  AgentDefinition agent = 2;
}

message GetAgentDefinitionRequest {
  string project_id = 1;
  string agent_id = 2;
}

message GetAgentDefinitionResponse {
  AgentDefinition agent = 1;
}

message ListAgentDefinitionsRequest {
  string project_id = 1;
}

message ListAgentDefinitionsResponse {
  repeated AgentDefinition agents = 1;
}

message UpdateAgentDefinitionRequest {
  string project_id = 1;
  string agent_id = 2;
  string role = 3;
  string system_prompt_content = 4;
  string description = 5;
}

message UpdateAgentDefinitionResponse {
  bool success = 1;
  AgentDefinition agent = 2;
}

message DeleteAgentDefinitionRequest {
  string project_id = 1;
  string agent_id = 2;
}

// =============================================================================
// Run History — persistent execution logs per project
// =============================================================================

message RunHistoryRecord {
  string run_id = 1;
  string project_id = 2;
  repeated string agent_ids = 3;
  string started_at = 4;
  string ended_at = 5;
  uint32 lessons_extracted = 6;
  uint32 prompt_changes = 7;
  float avg_outcome_score = 8;
  uint32 outcome_count = 9;
  // "active", "completed", "failed"
  string status = 10;
  uint32 ingest_count = 11;
}

message ListRunHistoryRequest {
  string project_id = 1;
  uint32 limit = 2;
}

message ListRunHistoryResponse {
  repeated RunHistoryRecord runs = 1;
}

message GetRunHistoryRequest {
  string project_id = 1;
  string run_id = 2;
}

message GetRunHistoryResponse {
  RunHistoryRecord run = 1;
}

// =============================================================================
// Agent Skills — versioned, optimizable tool/skill definitions
// =============================================================================

message SkillDefinition {
  string skill_id = 1;
  string project_id = 2;
  string agent_id = 3;         // empty = project-shared
  string name = 4;
  string description = 5;
  string parameters_schema = 6; // JSON Schema string
  string instructions = 7;     // markdown playbook (for playbook type)
  string skill_type = 8;       // "tool" or "playbook"
  string created_at = 9;
  string updated_at = 10;
}

message SkillVersion {
  string version_id = 1;
  string skill_id = 2;
  string description = 3;
  string parameters_schema = 4;
  string instructions = 5;
  string status = 6;           // "active", "candidate", "retired"
  uint32 version_number = 7;
  string source = 8;           // "manual", "optimization"
  string parent_version_id = 9;
  string created_at = 10;
  string activated_at = 11;
  string optimization_summary = 12;
  float avg_outcome_score = 13;
  uint32 outcome_count = 14;
  // Phase 1.1: see PromptVersion.ready_for_promotion for semantics.
  bool ready_for_promotion = 15;
  EvaluationReport evaluation_report = 16;
  // Phase A (AutoReason): review verdict (mirrors PromptVersion).
  ReviewVerdict review_result = 17;
  uint32 unchanged_review_streak = 18;
  bool lineage_locked = 19;
}

message CreateSkillRequest {
  string project_id = 1;
  string agent_id = 2;         // empty = project-shared
  string name = 3;
  string description = 4;
  string parameters_schema = 5;
  string instructions = 6;
  string skill_type = 7;       // "tool" or "playbook"
}

message CreateSkillResponse {
  bool success = 1;
  SkillDefinition skill = 2;
}

message GetSkillRequest {
  string project_id = 1;
  string skill_id = 2;
}

message GetSkillResponse {
  SkillDefinition skill = 1;
}

message ListSkillsRequest {
  string project_id = 1;
  string agent_id = 2;         // optional filter; empty = all (shared + agent-specific)
  uint32 limit = 3;
}

message ListSkillsResponse {
  repeated SkillDefinition skills = 1;
}

message UpdateSkillRequest {
  string project_id = 1;
  string skill_id = 2;
  string description = 3;
  string parameters_schema = 4;
  string instructions = 5;
}

message UpdateSkillResponse {
  bool success = 1;
  SkillDefinition skill = 2;
}

message DeleteSkillRequest {
  string project_id = 1;
  string skill_id = 2;
}

message ListSkillVersionsRequest {
  string skill_id = 1;
}

message ListSkillVersionsResponse {
  repeated SkillVersion versions = 1;
}

message ActivateSkillVersionRequest {
  string skill_id = 1;
  string version_id = 2;
}

message OptimizeSkillRequest {
  string skill_id = 1;
  bool auto_activate = 2;
  LlmOverride llm = 3;
  string project_id = 4;
}

message OptimizeSkillResponse {
  bool success = 1;
  SkillVersion candidate = 2;
  string optimization_summary = 3;
  float confidence = 4;
  bool activated = 5;
}

message GetSkillDiffRequest {
  string skill_id = 1;
  string version_a_id = 2;
  string version_b_id = 3;
}

message GetSkillDiffResponse {
  string diff_text = 1;
  SkillVersion version_a = 2;
  SkillVersion version_b = 3;
}

// =============================================================================
// Circuit breaker (Phase 1.5) — atomic anti-loop reset
// =============================================================================

message CircuitBreakRequest {
  string run_id = 1;
  // Free-form reason recorded on the snapshot lesson (e.g. "repeated_query",
  // "drift_detected", "manual"). Helps later diagnosis.
  string reason = 2;
  // Optional agent_id to attribute the event to.
  string agent_id = 3;
}

message CircuitBreakResponse {
  // True on success.
  bool broken = 1;
  // ID of the lesson entry that snapshot working memory before it was cleared.
  // Customers can dereference this to recover the pre-break state if needed.
  string snapshot_id = 2;
  // Human-readable summary of what was reset.
  string summary = 3;
}
