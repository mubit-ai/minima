// =============================================================================
// Prompt Lifecycle Management — versioned system prompts with auto-optimization
// =============================================================================

message PromptVersion {
  string version_id = 1;
  string agent_id = 2;
  string content = 3;
  // "active", "candidate", "retired", "archived"
  string status = 4;
  uint32 version_number = 5;
  // "manual", "optimization", "rollback"
  string source = 6;
  string parent_version_id = 7;
  string created_at = 8;
  string activated_at = 9;
  // Why this version was generated (empty for manual)
  string optimization_summary = 10;
  // Outcome stats accumulated while this version was active
  float avg_outcome_score = 11;
  uint32 outcome_count = 12;
  // Phase 1.1: set to true when the ChampionChallengerEvaluator has recommended
  // this challenger version be activated. Purely informational — the server
  // never auto-activates. Customers must call ActivatePromptVersion themselves.
  bool ready_for_promotion = 13;
  // Phase 1.1: populated alongside ready_for_promotion with the evaluator's
  // measurement of why this challenger beats the champion.
  EvaluationReport evaluation_report = 14;
  // Phase A (AutoReason): review verdict carried through to the customer
  // so they can inspect blind Borda scores. Present when reviews are
  // enabled upstream and this candidate was produced via Current/Challenger/Synthesis.
  ReviewVerdict review_result = 15;
  // Phase A: number of consecutive reviews the current version has won
  // unchanged. When this equals or exceeds the configured
  // `unchanged_lock_streak` the lineage is locked and further
  // auto-optimization is suppressed.
  uint32 unchanged_review_streak = 16;
  // Phase A: set to true when the lineage has been locked (current has won
  // k consecutive reviews). Informational — no auto-resets.
  bool lineage_locked = 17;
}

// Phase 1.1: evaluator output comparing a challenger version to the current
// champion. Reported verbatim to customers so they can judge promotion.
message EvaluationReport {
  // challenger.mean - champion.mean (positive means challenger outperforms).
  float mean_signal_delta = 1;
  // champion.negative_rate - challenger.negative_rate (positive means
  // challenger has fewer failures). A value > 0 is required to recommend.
  float negative_rate_delta = 2;
  // Number of outcomes recorded against the challenger version.
  uint32 runs_sampled = 3;
  // Epsilon used at evaluation time (from project settings).
  float epsilon_used = 4;
  // ISO-8601 timestamp of the last evaluation run.
  string evaluated_at = 5;
  // ID of the champion version that was compared against.
  string champion_version_id = 6;
  // Phase A (AutoReason): review verdict considered alongside signal stats.
  ReviewVerdict review = 7;
  // Phase A: consecutive-unchanged-wins counter tracked for this resource lineage.
  uint32 unchanged_streak = 8;
}

// Phase A (AutoReason): result of a blind Current/Challenger/Synthesis Borda review.
message ReviewVerdict {
  // Winning role: 0=Current, 1=Challenger, 2=Synthesis.
  uint32 winner_role = 1;
  // Borda score per role. Keys are role ints (0/1/2); values are scores.
  map<uint32, uint32> borda_scores = 2;
  // Number of judges that participated (0 if the review was degraded).
  uint32 judges_count = 3;
  // True when the panel was unavailable and Current won by default.
  bool degraded = 4;
  // Individual judge votes (optional for inspection / audit).
  repeated JudgeVote votes = 5;
}

// Phase A: a single judge's blind ranking of anonymized candidates.
message JudgeVote {
  uint32 judge_idx = 1;
  // Anonymized labels, best → worst (e.g. ["Y","X","Z"]).
  repeated string ranking = 2;
  // Short rationale from the judge.
  string rationale = 3;
}

// Phase B (Run Monitor): request for the latest run signal for a run.
// `agent_id` is optional (scope hint).
message GetRunSignalRequest {
  string run_id = 1;
  string agent_id = 2;
}

// Phase B: merged run signal. Returned even when no flags are raised, so
// dashboards can render the "no pathologies detected" state.
message RunSignal {
  bool is_looping = 1;
  bool is_drifting = 2;
  bool is_stuck = 3;
  bool is_novelty_starved = 4;
  float loop_score = 5;
  float drift_score = 6;
  string rationale = 7;
  float confidence = 8;
  // "rule" | "llm" | "probe" — which monitor produced the signal.
  string source = 9;
  string emitted_at = 10;
}

message GetRunSignalResponse {
  // Populated only when the monitor router is configured. When absent,
  // the router is disabled on the server; dashboards should treat this the
  // same as "no pathologies".
  RunSignal signal = 1;
  // True when no router is configured (feature flag off / no mode set).
  bool monitor_disabled = 2;
}

message SetPromptRequest {
  string agent_id = 1;
  string content = 2;
  // When true (default), immediately activate this version.
  bool activate = 3;
  // Optional run_id for scope/auth.
  string run_id = 4;
}

message SetPromptResponse {
  bool success = 1;
  PromptVersion version = 2;
}

message GetPromptRequest {
  string agent_id = 1;
  // Optional: get a specific version instead of the active one.
  string version_id = 2;
}

message GetPromptResponse {
  PromptVersion version = 1;
}

message ListPromptVersionsRequest {
  string agent_id = 1;
  // Page size. Defaults to 20 when <= 0.
  uint32 limit = 2;
  // Optional status filter: "active", "candidate", "retired", "archived".
  string status_filter = 3;
}

message ListPromptVersionsResponse {
  repeated PromptVersion versions = 1;
