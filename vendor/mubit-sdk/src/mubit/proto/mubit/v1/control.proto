syntax = "proto3";
package mubit.v1;

service ControlService {
  // State Memory (Structured Variables)
  rpc SetVariable(SetVariableRequest) returns (Ack);
  rpc GetVariable(GetVariableRequest) returns (VariableResponse);
  rpc ListVariables(ListVariablesRequest) returns (ListVariablesResponse);
  rpc DeleteVariable(DeleteVariableRequest) returns (Ack);

  // Concepts (Level 4 Agency)
  rpc DefineConcept(DefineConceptRequest) returns (Ack);
  rpc ListConcepts(ListConceptsRequest) returns (ListConceptsResponse);

  // Goals [DEPRECATED]
  // These RPCs are deprecated. Goal tracking is out of scope for Mubit's memory platform.
  // Use your external task system (Linear, Jira, etc.) for goal tracking.
  // These handlers remain wired for backward compat but will be removed in a future release.
  rpc AddGoal(AddGoalRequest) returns (GoalResponse);
  rpc UpdateGoal(UpdateGoalRequest) returns (Ack);
  rpc ListGoals(ListGoalsRequest) returns (ListGoalsResponse);
  rpc GetGoalTree(GetGoalTreeRequest) returns (GetGoalTreeResponse);

  // Actions [DEPRECATED]
  // Internal action/reasoning framework. Use LangGraph, CrewAI, or your own
  // agent orchestration instead. These handlers remain wired for backward compat.
  rpc SubmitAction(ActionRequest) returns (ActionResponse);
  rpc GetActionLog(ActionLogRequest) returns (ActionLogResponse);

  // Decision Cycle [DEPRECATED]
  // Internal decision loop. Replaced by external agent frameworks (LangGraph, CrewAI).
  // These handlers remain wired for backward compat.
  rpc RunCycle(RunCycleRequest) returns (CycleResponse);
  rpc GetCycleHistory(CycleHistoryRequest) returns (CycleHistoryResponse);

  // Management
  rpc DeleteRun(RunRequest) returns (Ack);

  // Events
  rpc Subscribe(SubscribeRequest) returns (stream Event);

  // Agent + control-plane primitives
  rpc RegisterAgent(AgentRegisterRequest) returns (AgentRegisterResponse);
  rpc AgentHeartbeat(AgentHeartbeatRequest) returns (Ack);
  rpc AppendActivity(ActivityAppendRequest) returns (ActivityAppendResponse);
  rpc GetRunSnapshot(RunSnapshotRequest) returns (RunSnapshotResponse);
  rpc LinkRun(LinkRunRequest) returns (LinkRunResponse);
  rpc UnlinkRun(UnlinkRunRequest) returns (UnlinkRunResponse);
  rpc Ingest(IngestRequest) returns (IngestAccepted);
  rpc BatchInsert(ControlBatchInsertRequest) returns (ControlBatchInsertResponse);
  rpc GetIngestJob(GetIngestJobRequest) returns (IngestJobResponse);
  rpc GetRunIngestStats(GetRunIngestStatsRequest) returns (RunIngestStatsResponse);
  rpc Query(AgentQueryRequest) returns (AgentQueryResponse);
  rpc Diagnose(DiagnoseRequest) returns (DiagnoseResponse);
  rpc Reflect(ReflectRequest) returns (ReflectResponse);

  // Lessons
  rpc ListLessons(ListLessonsRequest) returns (ListLessonsResponse);
  rpc DeleteLesson(DeleteLessonRequest) returns (Ack);

  // Context Block — pre-assembled memory context for LLM injection
  rpc GetContext(ContextRequest) returns (ContextResponse);

  // Exact archive primitive — store a reusable exact artifact block
  rpc ArchiveBlock(ArchiveBlockRequest) returns (ArchiveBlockResponse);

  // Exact dereference — read exact stored content by stable reference ID
  rpc Dereference(DereferenceRequest) returns (DereferenceResponse);

  // Chronological memory activity browse surface
  rpc ListActivity(ListActivityRequest) returns (ListActivityResponse);

  // Exact memory activity export surface
  rpc ExportActivity(ExportActivityRequest) returns (ExportActivityResponse);

  // Memory health — diagnostics for memory quality and lifecycle
  rpc GetMemoryHealth(MemoryHealthRequest) returns (MemoryHealthResponse);

  // Pre-compaction checkpoint — durable snapshot of context before compaction
  rpc Checkpoint(CheckpointRequest) returns (CheckpointResponse);

  // List registered agents for a run
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);

  // Agent-to-agent coordination primitives
  rpc CreateHandoff(HandoffRequest) returns (HandoffResponse);
  rpc SubmitFeedback(FeedbackRequest) returns (FeedbackResponse);

  // Anti-loop circuit breaker — snapshot WM, clear working memory, reset attention
  rpc CircuitBreak(CircuitBreakRequest) returns (CircuitBreakResponse);

  // Phase B (Run Monitor): return the last run signal computed for a run.
  // Re-inspects on demand so the signal reflects current drift monitor
  // state; LLM-backed monitor respects its min_interval cache.
  rpc GetRunSignal(GetRunSignalRequest) returns (GetRunSignalResponse);

  // Outcome feedback — record success/failure for a lesson or action
  rpc RecordOutcome(RecordOutcomeRequest) returns (RecordOutcomeResponse);

  // Step-level outcome — record per-step process rewards during a run
  rpc RecordStepOutcome(RecordStepOutcomeRequest) returns (RecordStepOutcomeResponse);

  // Strategy emergence — surface patterns from lesson clusters
  rpc SurfaceStrategies(SurfaceStrategiesRequest) returns (SurfaceStrategiesResponse);

  // Session lifecycle — server-managed session creation and tracking
  rpc CreateControlSession(CreateControlSessionRequest) returns (CreateControlSessionResponse);
  rpc GetControlSession(GetControlSessionRequest) returns (GetControlSessionResponse);
  rpc CloseControlSession(CloseControlSessionRequest) returns (Ack);

  // Prompt lifecycle management — versioned system prompts with auto-optimization
  rpc SetPrompt(SetPromptRequest) returns (SetPromptResponse);
  rpc GetPrompt(GetPromptRequest) returns (GetPromptResponse);
  rpc ListPromptVersions(ListPromptVersionsRequest) returns (ListPromptVersionsResponse);
  rpc ActivatePromptVersion(ActivatePromptVersionRequest) returns (Ack);
  rpc OptimizePrompt(OptimizePromptRequest) returns (OptimizePromptResponse);
  rpc GetPromptDiff(GetPromptDiffRequest) returns (GetPromptDiffResponse);

  // Project management — logical groupings of agents in a multi-agent system
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc UpdateProject(UpdateProjectRequest) returns (UpdateProjectResponse);
  rpc DeleteProject(DeleteProjectRequest) returns (Ack);

  // Agent definitions — persistent, project-scoped agent configurations with system prompts
  rpc CreateAgentDefinition(CreateAgentDefinitionRequest) returns (CreateAgentDefinitionResponse);
  rpc GetAgentDefinition(GetAgentDefinitionRequest) returns (GetAgentDefinitionResponse);
  rpc ListAgentDefinitions(ListAgentDefinitionsRequest) returns (ListAgentDefinitionsResponse);
  rpc UpdateAgentDefinition(UpdateAgentDefinitionRequest) returns (UpdateAgentDefinitionResponse);
  rpc DeleteAgentDefinition(DeleteAgentDefinitionRequest) returns (Ack);

  // Run history — persistent execution logs per project
  rpc ListRunHistory(ListRunHistoryRequest) returns (ListRunHistoryResponse);
  rpc GetRunHistory(GetRunHistoryRequest) returns (GetRunHistoryResponse);

  // Agent skills — versioned, optimizable tool/skill definitions
  rpc CreateSkill(CreateSkillRequest) returns (CreateSkillResponse);
  rpc GetSkill(GetSkillRequest) returns (GetSkillResponse);
  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse);
  rpc UpdateSkill(UpdateSkillRequest) returns (UpdateSkillResponse);
  rpc DeleteSkill(DeleteSkillRequest) returns (Ack);
  rpc ListSkillVersions(ListSkillVersionsRequest) returns (ListSkillVersionsResponse);
  rpc ActivateSkillVersion(ActivateSkillVersionRequest) returns (Ack);
  rpc OptimizeSkill(OptimizeSkillRequest) returns (OptimizeSkillResponse);
  rpc GetSkillDiff(GetSkillDiffRequest) returns (GetSkillDiffResponse);
}

message Ack {
  bool success = 1;
}

message RunRequest {
  string run_id = 1;
}

message SubscribeRequest {
  string run_id = 1;
  repeated string event_types = 2; // Optional filter
}

message Event {
  string id = 1;
  string type = 2; // "VariableUpdate", "GoalUpdate", etc.
  string run_id = 3;
  string agent_id = 4;
  string payload = 5; // JSON string of the object involved
  string created_at = 6;
}

message RunScope {
  string run_id = 1;
  repeated string linked_run_ids = 2;
  uint64 owner_user_id = 3;
}

message AgentIdentity {
  string agent_id = 1;
  string role = 2;
  repeated string capabilities = 3;
  string status = 4;
  string heartbeat_at = 5;
  // Memory scoping: which entry types this agent can read
  repeated string read_scopes = 6;
  // Memory scoping: which entry types this agent can write
  repeated string write_scopes = 7;
  // Shared memory lanes this agent participates in
  repeated string shared_memory_lanes = 8;
}

message ActivityRecord {
  string type = 1;
  string payload = 2;
  string tool_name = 3;
  string input_ref = 4;
  string output_ref = 5;
  string ts = 6;
  string agent_id = 7;
}

message RunSnapshot {
  string summary = 1;
  repeated string facts = 2;
  repeated string uncertainties = 3;
  repeated string blockers = 4;
  repeated string progress = 5;
  repeated string next_actions = 6;
  string updated_at = 7;
}

message PromotionDecision {
  string source_record_id = 1;
  string target = 2;
  float confidence = 3;
  string reason = 4;
  string policy_rule = 5;
  string created_at = 6;
}

message LlmOverride {
  string provider = 1;
  string model = 2;
  float temperature = 3;
  uint32 max_tokens = 4;
  uint64 timeout_ms = 5;
}

message ControlStatus {
  bool enabled = 1;
  bool healthy = 2;
  string provider = 3;
  string model = 4;
  string last_error = 5;
  string updated_at = 6;
}

message AgentRegisterRequest {
  string run_id = 1;
  string agent_id = 2;
  string role = 3;
  repeated string capabilities = 4;
  string status = 5;
  // Memory scoping: entry types this agent can read (empty = all)
  repeated string read_scopes = 6;
  // Memory scoping: entry types this agent can write (empty = all)
  repeated string write_scopes = 7;
  // Shared memory lanes this agent participates in
  repeated string shared_memory_lanes = 8;
  // Optional: client-computed embedding of the agent's declared objective /
  // role. When supplied, DriftMonitor uses it as the reference vector for
  // objective-drift detection on subsequent queries. Empty = objective drift
  // scoring stays disabled (pre-existing behaviour).
  repeated float objective_embedding = 9;
}

message AgentRegisterResponse {
  bool success = 1;
  AgentIdentity agent = 2;
}

message AgentHeartbeatRequest {
  string run_id = 1;
  string agent_id = 2;
  string status = 3;
}

message ActivityAppendRequest {
  string run_id = 1;
  string agent_id = 2;
  ActivityRecord activity = 3;
  LlmOverride llm = 4;
}

message ActivityAppendResponse {
  bool success = 1;
  string event_id = 2;
}

message RunSnapshotRequest {
  string run_id = 1;
  uint64 timeline_limit = 2;
  bool refresh = 3;
  LlmOverride llm = 4;
}

message RunSnapshotResponse {
  RunScope scope = 1;
  RunSnapshot snapshot = 2;
  repeated AgentIdentity agents = 3;
  repeated Event timeline = 4;
  repeated PromotionDecision promotions = 5;
  ControlStatus control_status = 6;
  // Whether timeline events are available for this run.
  // When false, the timeline field will be empty — the run may still have
  // a valid snapshot/promotions. Clients should not assume timeline absence
  // means no data exists.
  bool timeline_available = 7;
}

message LinkRunRequest {
  string run_id = 1;
  string linked_run_id = 2;
}

message LinkRunResponse {
  bool success = 1;
  RunScope scope = 2;
}

message UnlinkRunRequest {
  string run_id = 1;
  string linked_run_id = 2;
}

message UnlinkRunResponse {
  bool success = 1;
  RunScope scope = 2;
}

message IngestItem {
  string item_id = 1;
  string content_type = 2;
  string text = 3;
  string payload_json = 4;
  string hints_json = 5;
  string metadata_json = 6;
  // Optional intent tag for structured routing (e.g. "observation", "tool_output",
  // "lesson", "rule", "handoff", "feedback", "context", "fact", "trace",
  // "log", "reflection", "task_result", "archive_block", "checkpoint",
  // "step_outcome", "mental_model").
  // When present and not empty, bypasses LLM/heuristic classification.
  string intent = 7;
  // Lesson-specific fields (used when intent="lesson" or entry_type is lesson).
  // lesson_type: "success", "failure", "observation", "rule", "preference"
  string lesson_type = 8;
  // lesson_scope: "run", "session", "global"
  string lesson_scope = 9;
  // lesson_importance: "low", "medium", "high", "critical"
  string lesson_importance = 10;
  // lesson_conditions: JSON array of condition strings
  string lesson_conditions_json = 11;
  // Optional user/entity ID for multi-user memory scoping.
  // When set, memory is partitioned by this user within the run.
  string user_id = 12;
  // Optional upsert key. When set, an existing entry with the same key
  // in the (run_id, user_id) scope is updated instead of creating a new entry.
  string upsert_key = 13;
  // Importance level for this item (applies to all entry types, not just lessons).
  // Values: "low", "medium", "high", "critical". Default: auto-assigned based
  // on entry type when not provided.
  string importance = 14;
  // Ingestion source classification: "agent" (default), "human", or "system".
  string source = 20;
  // Optional memory lane for multi-agent coordination.
  // When set, this item is scoped to the named lane and only visible to
  // agents that share the same lane or explicitly query with lane_filter.
  string lane = 21;
  // When the event actually occurred (unix seconds). Distinct from ingestion
  // time (created_at). Use for temporal queries like "What happened in January?"
  // where the user means occurrence time, not when the system learned about it.
  // When 0 or unset, the system attempts to extract occurrence time from
  // metadata fields ("occurrence_time", "event_time", "session_date").
  int64 occurrence_time = 22;
  // Semantic environment tags in TYPE:NAME or TYPE:NAME:VERSION format.
  // Stored in entry metadata; used for tag-aware retrieval scoring.
  repeated string env_tags = 23;
}

message IngestRequest {
  string run_id = 1;
  string agent_id = 2;
  string idempotency_key = 3;
  bool parallel = 4;
  repeated IngestItem items = 5;
}

message IngestAccepted {
  bool accepted = 1;
  string job_id = 2;
  bool deduplicated = 3;
  string status = 4;
}

message ControlBatchInsertItem {
  string item_id = 1;
  string text = 2;
  string metadata_json = 3;
  string source = 4;
  repeated float embedding = 5;
  // Semantic environment tags in TYPE:NAME or TYPE:NAME:VERSION format.
  // e.g. ["lang:python:3.12", "framework:langchain:0.3", "error_type:timeout"]
  // Used for tag-aware retrieval scoring so knowledge tagged for one environment
  // doesn't pollute results for a different environment.
  repeated string env_tags = 6;
}

message ControlBatchInsertRequest {
  string run_id = 1;
  repeated ControlBatchInsertItem items = 2;
  bool deduplicate = 3;
}

message ControlBatchInsertItemResult {
  string item_id = 1;
  bool success = 2;
  uint64 node_id = 3;
  string error = 4;
}

message ControlBatchInsertResponse {
  bool success = 1;
  uint32 count = 2;
  repeated uint64 node_ids = 3;
  repeated ControlBatchInsertItemResult item_results = 4;
  string message = 5;
}

message GetIngestJobRequest {
  string run_id = 1;
  string job_id = 2;
}

message IngestWriteResult {
  string memory_type = 1;
  string record_id = 2;
  bool success = 3;
  string error = 4;
}

message IngestDecisionTrace {
  string item_id = 1;
  string content_type = 2;
  repeated string selected_types = 3;
  string reasoning = 4;
  string enriched_metadata_json = 5;
  repeated IngestWriteResult writes = 6;
  float confidence = 7;
}

message IngestJobResponse {
  string job_id = 1;
  string run_id = 2;
  string status = 3;
  bool done = 4;
  string error = 5;
  string created_at = 6;
  string started_at = 7;
  string finished_at = 8;
  repeated IngestDecisionTrace traces = 9;
  bool ordered = 10;
  bool deduplicated = 11;
}

message GetRunIngestStatsRequest {
  string run_id = 1;
}

message AgentIngestStats {
  string agent_id = 1;
  uint32 job_count = 2;
  uint32 completed_job_count = 3;
  uint32 failed_job_count = 4;
  uint32 deduplicated_job_count = 5;
  uint32 item_count = 6;
  string last_job_at = 7;
}

message RunIngestStatsResponse {
  string run_id = 1;
  uint32 total_jobs = 2;
  uint32 completed_jobs = 3;
  uint32 failed_jobs = 4;
  uint32 deduplicated_jobs = 5;
  uint32 total_items = 6;
  repeated AgentIngestStats agents = 7;
  // Whether stats are fully available. When false, the storage backend
  // may have evicted job records and counts may be incomplete.
  bool stats_available = 8;
  // Typed reason when stats are unavailable or partial.
  string status_reason = 9;
}

enum QueryMode {
  QUERY_MODE_UNSPECIFIED = 0;
  AGENT_ROUTED = 1;
  DIRECT_BYPASS = 2;
}

enum DirectQueryLane {
  DIRECT_QUERY_LANE_UNSPECIFIED = 0;
  SEMANTIC_SEARCH = 1;
}

message AgentQueryRequest {
  string run_id = 1;
  string query = 2;
  string schema = 3;
  QueryMode mode = 4;
  DirectQueryLane direct_lane = 5;
  bool include_linked_runs = 6;
  uint64 limit = 7;
  repeated float embedding = 8;
  // Optional LTM entry type filter (e.g. ["fact", "lesson", "trace"]).
  // When non-empty, only evidence matching these types is included.
  repeated string entry_types = 9;
  // Whether to include Working Memory variables/goals in evidence.
  // Defaults to true when not set.
  bool include_working_memory = 10;
  // Optional user/entity ID to scope query results to a specific user's memories.
  string user_id = 11;
  // Optional agent ID for scope-aware retrieval.
  // When set, evidence is filtered to only include types the agent
  // has declared in its read_scopes during registration.
  string agent_id = 12;
  // Optional lane filter for multi-agent coordination.
  // When set, only entries tagged with this lane are returned.
  string lane_filter = 13;
  // Optional temporal range filter (inclusive, unix seconds).
  // When set, only entries whose occurrence_time (or created_at fallback)
  // falls within [min_timestamp, max_timestamp] are considered.
  // Activates the temporal retrieval source as an independent RRF branch.
  int64 min_timestamp = 14;
  int64 max_timestamp = 15;
  // Search budget tier: "low", "mid", "high" (default: "mid").
  // Controls the latency/quality tradeoff:
  //   low  — skip graph/SDM, fewer ANN candidates (fastest)
  //   mid  — standard retrieval (default)
  //   high — deeper graph traversal, more candidates, optional reranking
  string budget = 16;
  // Ranking strategy: "relevance" (default), "freshness", "balanced".
  // "relevance"  = semantic-dominant (current default weights)
  // "freshness"  = recency_weight boosted (0.50 semantic, 0.10 lexical, 0.40 recency)
  // "balanced"   = even split (0.60 semantic, 0.15 lexical, 0.25 recency)
  string rank_by = 17;
  // When true, each QueryEvidence item includes an ExplainInfo breakdown
  // of individual scoring components (semantic, lexical, recency, decay, etc.).
  bool explain = 18;
  // When true, only evidence from the current run is returned. Cross-run
  // session-scoped lessons (lesson_overlay) are skipped. Useful for smoke
  // tests and interactive sessions where freshly-ingested entries must
  // surface deterministically regardless of historical corpus size.
  // Defaults to false — cross-run lesson retrieval is the intended
  // behavior for durable learning.
  bool prefer_current_run = 19;
  // Semantic environment tags describing the caller's context, e.g.
  // ["lang:python:3.12", "framework:langchain:0.3"].
  // Entries whose stored env_tags intersect with these receive a relevance
  // boost; entries with conflicting tags receive a small penalty. This
  // prevents knowledge from one environment polluting results for another.
  repeated string env_tags = 20;
}

// Score breakdown returned when explain=true on AgentQueryRequest.
message ExplainInfo {
  float semantic_score = 1;
  float lexical_score = 2;
  float recency_score = 3;
  // Temporal decay multiplier applied to semantic_score (1.0 = no decay).
  float temporal_decay_factor = 4;
  // Whether a 0.5x stale penalty was applied.
  bool stale_penalty_applied = 5;
  // The fusion weights that produced the final score.
  map<string, float> fusion_weights_used = 6;
  // Whether temporal intent was detected in the query text.
  bool temporal_intent_detected = 7;
  // The rank_by mode that was effective ("relevance", "freshness", "balanced").
  string rank_by_mode = 8;
}

message QueryEvidence {
  string id = 1;
  string content = 2;
  string source = 3;
  float score = 4;
  string run_id = 5;
  // Entry type tag (e.g. "fact", "lesson", "working_memory", "goal")
  string entry_type = 6;
  // Serialized JSON metadata associated with this evidence item.
  string metadata_json = 7;
  // Retrieval provenance: semantic | exact_reference | checkpoint |
  // rule_overlay | lesson_overlay | archive_overlay | working_memory.
  string retrieval_mode = 8;
  // Stable reference ID when this evidence can be re-read exactly.
  string reference_id = 9;
  // Whether the evidence is exact-referenceable through Dereference.
  bool referenceable = 10;
  // Original stored entry type before any overlay/synthetic grouping.
  string origin_entry_type = 11;
  // Whether this evidence has been superseded by a newer entry.
  // Stale entries are deprioritized in ranking but still returned for
  // transparency. Clients should prefer non-stale entries for answers.
  bool is_stale = 12;
  // ID of the entry that supersedes this one (empty if not stale).
  string superseded_by = 13;
  // Score breakdown (populated only when explain=true on the request).
  ExplainInfo explain_info = 14;
  // Composite knowledge reliability score in [0, 1].
  // Combines reinforcement history, lesson scope weight (run < session <
  // global < org), production-verification flag, and recency — minus a
  // contradiction penalty when opposing lessons are known. Distinct from
  // `score` (retrieval similarity); agents can use this to weight how much
  // to trust the evidence independent of topical relevance.
  float knowledge_confidence = 15;
}

message AgentQueryResponse {
  string final_answer = 1;
  repeated QueryEvidence evidence = 2;
  float confidence = 3;
  string mode = 4;
  bool degraded = 5;
  repeated string consulted_runs = 6;
  string routing_summary = 7;
  // Anti-drift / anti-loop diagnostic signals computed by DriftMonitorAgent.
  // Populated when the request's run_id has active drift state. Empty/zeroed
  // fields mean "no signal raised" — customers can safely ignore unless
  // defending against runaway agent behaviour (Phase 1.4).
  DriftSignals signals = 8;
  // 0-based indices into `evidence` that the synthesized `final_answer` is
  // grounded in, as reported by the query agent. Empty when the model cited
  // nothing or the answer was an abstention. Validated server-side against the
  // evidence length, so every value is a valid index into `evidence` above.
  // Use these to render citations or audit answer grounding.
  repeated uint32 citations = 9;
}

// Drift signals surfaced by DriftMonitorAgent. Customers inspect these to
// decide whether to circuit_break, escalate, or switch agents. All flags are
// non-destructive — the server never acts on them automatically.
message DriftSignals {
  // True when the same (normalised) query has been issued >= repeat_threshold
  // times within a rolling window. Agent is likely looping.
  bool repeated = 1;
  // True when the rolling window of outcome signals shows a negative streak
  // past its threshold. Agent is failing consistently.
  bool stagnant = 2;
  // 0.0–1.0 — cosine distance between current query embedding and the agent's
  // registered objective embedding. Higher = more drift. -1 when objective
  // embedding is not available.
  float drift_score = 3;
  // 0.0–1.0 — fraction of recent steps that introduced genuinely new entities.
  // Low = novelty starved (agent not learning anything new). -1 when unknown.
  float novelty_score = 4;
  // Count of repeated queries contributing to `repeated`. 0 when not set.
  uint32 repeat_count = 5;
  // Length of current negative-outcome streak. 0 when no streak.
  uint32 negative_streak = 6;
}

message DiagnoseRequest {
  string run_id = 1;
  string error_text = 2;
  string error_type = 3;
  uint64 limit = 4;
  // Optional user/entity ID scope.
  string user_id = 5;
}

message DiagnoseResponse {
  repeated QueryEvidence failure_lessons = 1;
  string summary = 2;
  uint32 total_failure_lessons = 3;
}

// =============================================================================
// State Memory (Structured Variables)
// =============================================================================

message SetVariableRequest {
  string run_id = 1;
  string name = 2;
  string value_json = 3;  // JSON-encoded value
  string source = 4;      // "system", "reasoning", "retrieval", "perception", "explicit"
}

message GetVariableRequest {
  string run_id = 1;
  string name = 2;
}

message VariableResponse {
  string name = 1;
  string value_json = 2;
  string var_type = 3;
  string created_at = 4;
  string last_updated = 5;
  uint64 access_count = 6;
  string source = 7;
}

message ListVariablesRequest {
  string run_id = 1;
}

message ListVariablesResponse {
  repeated VariableResponse variables = 1;
}

message DeleteVariableRequest {
  string run_id = 1;
  string name = 2;
}

message DefineConceptRequest {
  string run_id = 1;
  string name = 2;
  string schema_json = 3;
}

message ListConceptsRequest {
  string run_id = 1;
}

message Concept {
  string name = 1;
  string schema_json = 2;
}

message ListConceptsResponse {
  repeated Concept concepts = 1;
}

// =============================================================================
// Goals
// =============================================================================

message AddGoalRequest {
  string run_id = 1;
  string description = 2;
  string priority = 3;    // "low", "medium", "high", "critical"
  string parent_id = 4;   // Optional parent goal ID
  string parent_goal_id = 5; // Optional parent goal ID (preferred alias)
}

message GoalResponse {
  string id = 1;
  string description = 2;
  string priority = 3;
  string status = 4;
  string parent_id = 5;
  string created_at = 6;
}

message UpdateGoalRequest {
  string run_id = 1;
  string goal_id = 2;
  string status = 3;      // "active", "suspended", "achieved", "abandoned", "failed"
}

message ListGoalsRequest {
  string run_id = 1;
  string status_filter = 2;  // Optional: filter by status
}

message ListGoalsResponse {
  repeated GoalResponse goals = 1;
}

message GetGoalTreeRequest {
  string run_id = 1;
  // Optional root goal ID. When unset, all root-level goals are returned.
  string root_goal_id = 2;
}

