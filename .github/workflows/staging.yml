name: Deploy — Staging

# Triggered on every push to `staging` (i.e. every PR merge into staging).
on:
  push:
    branches: [staging]

# Only one staging deployment at a time; cancel the older run if a newer push
# arrives so the latest commit always wins on staging.
concurrency:
  group: staging
  cancel-in-progress: true

# Needed for Workload Identity Federation (id-token) and repo checkout (contents).
permissions:
  contents: read
  id-token: write

# ── shared env ────────────────────────────────────────────────────────────────
# Set GCP_REGION and GAR_REPOSITORY as repository variables (Settings → Variables)
# to override these defaults.
env:
  GCP_REGION:       ${{ vars.GCP_REGION       || 'europe-west1' }}
  GAR_REPO:         ${{ vars.GAR_REPOSITORY   || 'minima' }}
  SERVICE_NAME:     ${{ vars.STAGING_SERVICE  || 'minima-staging' }}
  DOCS_SERVICE:     ${{ vars.STAGING_DOCS_SERVICE || 'minima-docs-staging' }}

# ── jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Minima service ───────────────────────────────────────────────────────
  deploy-service:
    name: Service → Cloud Run (staging)
    runs-on: ubuntu-latest

    steps:
      # Check out the minima repo into ./minima so the docs job can also check
      # out at the root later without a path conflict.
      - name: Checkout minima
        uses: actions/checkout@v4
        with:
          path: minima

      # Sparse-checkout only the Python SDK subtree from ricedb to keep things fast.
      - name: Checkout mubit-sdk from ricedb
        uses: actions/checkout@v4
        with:
          repository: mubit-ai/ricedb
          path: ricedb
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: sdk/python/mubit-sdk
          sparse-checkout-cone-mode: false

      # The Dockerfile expects vendor/mubit-sdk inside the build context (./minima).
      # pyproject.toml resolves "../ricedb/sdk/python/mubit-sdk" from /build →
      # the Dockerfile copies it to /ricedb/sdk/python/mubit-sdk which matches.
      - name: Vendor mubit-sdk into build context
        run: |
          mkdir -p minima/vendor
          cp -r ricedb/sdk/python/mubit-sdk minima/vendor/mubit-sdk

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push service image
        env:
          IMAGE_BASE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/minima-service
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag  "$IMAGE_BASE:staging-${{ github.sha }}" \
            --tag  "$IMAGE_BASE:staging-latest" \
            --push \
            --cache-from "type=registry,ref=$IMAGE_BASE:staging-latest" \
            --cache-to   "type=inline" \
            minima/

      - name: Deploy service to Cloud Run (staging)
        id: deploy-service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image:   ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/minima-service:staging-${{ github.sha }}
          region:  ${{ env.GCP_REGION }}
          # Scale to zero on staging to save cost; allow unauthenticated so the
          # team can test without credentials.
          flags: >-
            --min-instances=0
            --max-instances=10
            --memory=1Gi
            --cpu=1
            --port=8080
            --allow-unauthenticated
            --service-account=${{ secrets.GCP_CLOUD_RUN_SA }}
          # Non-secret env vars — staging-specific values.
          env_vars: |
            MUBIT_TRANSPORT=http
            MINIMA_LOG_LEVEL=info
            MINIMA_RECOMMENDATION_STORE=sqlite
            MINIMA_SQLITE_PATH=/tmp/minima_state.db
            MINIMA_TENANT_STORE_PATH=/tmp/minima_tenants.db
          # Secret Manager references (project/SECRET_NAME/versions/latest).
          # Create these secrets in GCP before the first deployment:
          #   gcloud secrets create minima-staging-mubit-api-key  --replication-policy=automatic
          #   gcloud secrets create minima-staging-mubit-endpoint --replication-policy=automatic
          secrets: |
            MUBIT_API_KEY=minima-staging-mubit-api-key:latest
            MUBIT_ENDPOINT=minima-staging-mubit-endpoint:latest

      - name: Print service URL
        run: echo "Service deployed → ${{ steps.deploy-service.outputs.url }}"

  # ── 2. Docs site ────────────────────────────────────────────────────────────
  deploy-docs:
    name: Docs → Cloud Run (staging)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout minima
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push docs image
        env:
          IMAGE_BASE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/minima-docs
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag  "$IMAGE_BASE:staging-${{ github.sha }}" \
            --tag  "$IMAGE_BASE:staging-latest" \
            --push \
            --cache-from "type=registry,ref=$IMAGE_BASE:staging-latest" \
            --cache-to   "type=inline" \
            docs-site/

      - name: Deploy docs to Cloud Run (staging)
        id: deploy-docs
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.DOCS_SERVICE }}
          image:   ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/minima-docs:staging-${{ github.sha }}
          region:  ${{ env.GCP_REGION }}
          flags: >-
            --min-instances=0
            --max-instances=3
            --memory=256Mi
            --cpu=1
            --port=8080
            --allow-unauthenticated
            --service-account=${{ secrets.GCP_CLOUD_RUN_SA }}

      - name: Print docs URL
        run: echo "Docs deployed → ${{ steps.deploy-docs.outputs.url }}"
