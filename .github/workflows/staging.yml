name: Deploy — Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-minima-staging
  cancel-in-progress: true

env:
  PROJECT:      mubit-dev-489910
  REGION:       europe-west4
  REGISTRY:     europe-west4-docker.pkg.dev/mubit-dev-489910/minima
  SERVICE_NAME: minima-staging
  DOCS_SERVICE: minima-docs-staging
  IMAGE_TAG:    staging-${{ github.sha }}

permissions:
  contents: read
  id-token: write

jobs:

  # ── 1. Minima service ───────────────────────────────────────────────────────
  deploy-service:
    name: Service → Cloud Run (staging)
    runs-on: ubuntu-latest-m

    steps:
      - name: Checkout minima
        uses: actions/checkout@v5
        with:
          path: minima

      - name: Checkout mubit-sdk from ricedb
        uses: actions/checkout@v5
        with:
          repository: mubit-ai/ricedb
          path: ricedb
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: sdk/python/mubit-sdk
          sparse-checkout-cone-mode: false

      - name: Vendor mubit-sdk into build context
        run: |
          mkdir -p minima/vendor
          cp -r ricedb/sdk/python/mubit-sdk minima/vendor/mubit-sdk

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT }}
          workload_identity_provider: ${{ secrets.GCP_DEV_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEV_DEPLOYER_SA_EU }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push service image
        uses: docker/build-push-action@v6
        with:
          context: ./minima
          file: ./minima/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/minima-service:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/minima-service:staging-latest
          cache-from: type=gha,scope=minima-service-staging
          cache-to: type=gha,mode=max,scope=minima-service-staging

      - name: Deploy service to Cloud Run (staging)
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGISTRY }}/minima-service:${{ env.IMAGE_TAG }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 8080 \
            --cpu 1 \
            --memory 1Gi \
            --min-instances 0 \
            --max-instances 10 \
            --allow-unauthenticated \
            --service-account ${{ secrets.GCP_DEV_DEPLOYER_SA_EU }} \
            --set-env-vars="MUBIT_ENDPOINT=https://api.mubit.ai,MUBIT_TRANSPORT=http,MINIMA_LOG_LEVEL=info,MINIMA_RECOMMENDATION_STORE=sqlite,MINIMA_SQLITE_PATH=/tmp/minima_state.db,MINIMA_REASONER_PROVIDER=gemini,MINIMA_REASONER_MODEL=gemini-3.5-flash" \
            --set-secrets="GEMINI_API_KEY=minima-staging-gemini-key:latest,ANTHROPIC_API_KEY=minima-staging-anthropic-key:latest,OPENROUTER_API_KEY=minima-staging-openrouter-key:latest" \
            --quiet

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "::notice::Minima service (staging) deployed to: $URL"

  # ── 2. Docs site ────────────────────────────────────────────────────────────
  deploy-docs:
    name: Docs → Cloud Run (staging)
    runs-on: ubuntu-latest-m

    steps:
      - name: Checkout minima
        uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT }}
          workload_identity_provider: ${{ secrets.GCP_DEV_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEV_DEPLOYER_SA_EU }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push docs image
        uses: docker/build-push-action@v6
        with:
          context: ./docs-site
          file: ./docs-site/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/minima-docs:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/minima-docs:staging-latest
          cache-from: type=gha,scope=minima-docs-staging
          cache-to: type=gha,mode=max,scope=minima-docs-staging

      - name: Deploy docs to Cloud Run (staging)
        run: |
          gcloud run deploy ${{ env.DOCS_SERVICE }} \
            --image ${{ env.REGISTRY }}/minima-docs:${{ env.IMAGE_TAG }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 8080 \
            --cpu 1 \
            --memory 256Mi \
            --min-instances 0 \
            --max-instances 3 \
            --allow-unauthenticated \
            --service-account ${{ secrets.GCP_DEV_DEPLOYER_SA_EU }} \
            --quiet

      - name: Print docs URL
        run: |
          URL=$(gcloud run services describe ${{ env.DOCS_SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "::notice::Minima docs (staging) deployed to: $URL"
